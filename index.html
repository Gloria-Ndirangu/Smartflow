<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smartflow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <div class="card">

      <!-- Logo -->
      <div class="logo">
        <img src="logo.jpeg" alt="Smartflow Logo">
      </div>

      <!-- Traffic Light -->
      <div class="traffic-light">
        <span class="red"></span>
        <span class="yellow"></span>
        <span class="green"></span>
      </div>

      <!-- Text -->
      <p>MOVE SMART</p>
      <p>SAVE TIME</p>
      <p>WELCOME!</p>

      <!-- CONTINUE BUTTON -->
      <button onclick="goToSignup()">CONTINUE</button>

    </div>
  </div>

  <!-- ONLY SCRIPT YOU NEED -->
  <script>
    function goToSignup() {
      window.location.href = "signup.html";
    }
  </script>

</body>
</html>
