<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Traffic</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .phone {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f7fb;
    }

    .header {
      background: white;
      padding: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      padding-bottom: 120px; /* IMPORTANT so button is visible */
    }

    .light-btn {
      margin: 5px 0;
      padding: 10px;
      width: 100%;
    }

    .main-btn {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
    }

    video, img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="phone">

  <!-- HEADER -->
  <div class="header">
    <span onclick="goBack()">←</span>
    <h3>REPORT TRAFFIC</h3>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <p>What do you see?</p>

    <label><input type="radio" name="report"> Heavy Traffic</label><br>
    <label><input type="radio" name="report"> Accident</label><br>
    <label><input type="radio" name="report"> Road Block</label><br>
    <label><input type="radio" name="report"> Flooding</label><br>
    <label><input type="radio" name="report"> Construction</label>

    <br><br>

    <p>Optional Photo</p>

    <button class="light-btn" type="button" onclick="openCamera('environment')">
      📷 Back Camera
    </button>

    <button class="light-btn" type="button" onclick="openCamera('user')">
      🤳 Front Camera
    </button>

    <video id="video" autoplay playsinline style="display:none;"></video>

    <button id="captureBtn" class="light-btn" style="display:none;" onclick="capturePhoto()">
      📸 Capture Photo
    </button>

    <canvas id="canvas" style="display:none;"></canvas>

    <img id="photo" style="display:none;" />

    <br>

    <label>
      <input type="checkbox"> Auto Detect Location
    </label>

    <button class="main-btn" onclick="submitReport()">
      Submit Report
    </button>

  </div>

</div>

<script>

let stream;

/* BACK BUTTON */
function goBack() {
  window.location.href = "livetraffic.html";
}

/* CAMERA */
function openCamera(facingMode) {
  const video = document.getElementById("video");
  const captureBtn = document.getElementById("captureBtn");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode }
  })
  .then(s => {
    stream = s;
    video.srcObject = s;
    video.style.display = "block";
    captureBtn.style.display = "block";
  })
  .catch(err => {
    alert("Camera not available or permission denied");
  });
}

/* CAPTURE PHOTO */
function capturePhoto() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const photo = document.getElementById("photo");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const imageData = canvas.toDataURL("image/png");

  photo.src = imageData;
  photo.style.display = "block";

  localStorage.setItem("incidentPhoto", imageData);

  stream.getTracks().forEach(track => track.stop());

  video.style.display = "none";
  document.getElementById("captureBtn").style.display = "none";
}

/* SUBMIT REPORT */
function submitReport() {

  const selected = document.querySelector('input[name="report"]:checked');

  if (!selected) {
    alert("Please select what you see");
    return;
  }

  const photo = localStorage.getItem("incidentPhoto");

  if (!photo) {
    alert("Please take a photo first");
    return;
  }

  navigator.geolocation.getCurrentPosition(position => {

    const report = {
      type: selected.parentElement.innerText.trim(),
      lat: position.coords.latitude,
      lng: position.coords.longitude,
      photo: photo,
      time: new Date().toISOString()
    };

    let reports = JSON.parse(localStorage.getItem("reports")) || [];
    reports.push(report);

    localStorage.setItem("reports", JSON.stringify(reports));

    alert("Report submitted successfully!");

    localStorage.removeItem("incidentPhoto");

    window.location.href = "livetraffic.html";
  });

}

</script>

</body>
</html>
